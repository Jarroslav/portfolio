<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG card source</title>
    <!--
      Source of truth for public/images/og-v2.png (1200x630).
      Fonts are self-hosted in ./fonts so rendering never depends on the network
      and never races a webfont swap. Render with ./generate.mjs.

      Geometry below was measured off the original public/images/og.png so the
      regenerated card is pixel-identical apart from the intended copy changes.
      Load with ?variant=reference to re-render the ORIGINAL copy, which is how
      generate.mjs verifies the template still reproduces og.png exactly.
    -->
    <style>
      @font-face {
        font-family: 'Space Grotesk';
        src: url('./fonts/space-grotesk-var-latin.woff2') format('woff2');
        font-weight: 300 700;
        font-display: block;
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        src: url('./fonts/ibm-plex-mono-400-latin.woff2') format('woff2');
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        src: url('./fonts/ibm-plex-mono-500-latin.woff2') format('woff2');
        font-weight: 500;
        font-display: block;
      }

      :root {
        /* Palette — sampled from the original PNG. Where a value matches a
           token in src/styles/tokens.css the token is named alongside it. */
        --bg: #f4f2ec; /* --bg */
        --surface: #ffffff; /* --surface */
        --ink: #1c1b18; /* --ink */
        --violet-text: #6a4b9a; /* --violet-text, oklch(0.4 0.14 300) */
        --green-dot: #2f9e63; /* --green-dot, oklch(0.55 0.14 155) */
        --gh: #999999; /* rgba(0,0,0,0.4) on white — --muted-40 */
        --subtitle: #575757;
        --caption: #808080;
        --rule: #f2f2f2;

        /* Geometry — page coordinates, measured from og.png */
        --card-inset: 31px;
        --card-radius: 28px;
        --content-x: 88px;
        --content-w: 1024px;
        --col-w: 256px;

        --kicker-y: 121px;
        --kicker-size: 20px;
        --kicker-tracking: 0.098em;
        --dot-x: 90px;
        --dot-y: 126px;
        --dot-size: 12px;
        --kicker-text-x: 116px;

        --gh-y: 123px;
        --gh-size: 18px;

        --name-x: 86px; /* 2px left of --content-x: optical, matches the original */
        --name-y: 197px;
        --name-size: 86px;
        --name-tracking: -0.041em;

        --subtitle-y: 298px;
        --subtitle-size: 40px;

        --rule-y: 403px;
        --rule-h: 2px;

        --value-y: 457px;
        --value-size: 42px;
        --caption-y: 511px;
        --caption-size: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      .page {
        position: relative;
        width: 1200px;
        height: 630px;
        background: var(--bg);
        /* Keep glyph rasterisation deterministic across machines. */
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      .card {
        position: absolute;
        inset: var(--card-inset);
        background: var(--surface);
        border-radius: var(--card-radius);
      }

      .dot {
        position: absolute;
        left: var(--dot-x);
        top: var(--dot-y);
        width: var(--dot-size);
        height: var(--dot-size);
        border-radius: 50%;
        background: var(--green-dot);
      }

      .kicker,
      .gh,
      .name,
      .subtitle,
      .value,
      .caption {
        position: absolute;
        line-height: 1;
        white-space: nowrap;
      }

      .kicker {
        left: var(--kicker-text-x);
        top: var(--kicker-y);
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 500;
        font-size: var(--kicker-size);
        letter-spacing: var(--kicker-tracking);
        color: var(--violet-text);
        text-transform: uppercase;
      }

      .gh {
        right: var(--content-x);
        top: var(--gh-y);
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 400;
        font-size: var(--gh-size);
        color: var(--gh);
      }

      .name {
        left: var(--name-x);
        top: var(--name-y);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: var(--name-size);
        letter-spacing: var(--name-tracking);
        color: var(--ink);
      }

      .subtitle {
        left: var(--content-x);
        top: var(--subtitle-y);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: var(--subtitle-size);
        color: var(--subtitle);
      }

      .rule {
        position: absolute;
        left: var(--content-x);
        top: var(--rule-y);
        width: var(--content-w);
        height: var(--rule-h);
        background: var(--rule);
      }

      .value {
        top: var(--value-y);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: var(--value-size);
        color: var(--ink);
      }

      .caption {
        top: var(--caption-y);
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 400;
        font-size: var(--caption-size);
        color: var(--caption);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card"></div>

      <div class="dot"></div>
      <div class="kicker">Agentic SDLC &middot; Quality Engineering</div>
      <div class="gh">github.com/Jarroslav</div>

      <div class="name">Yaroslav Krivushenko</div>
      <div class="subtitle" id="subtitle">Lead Test Automation Engineer</div>

      <div class="rule"></div>

      <div id="stats"></div>
    </div>

    <script>
      // `reference` re-renders the copy exactly as it appears in the original
      // og.png, so generate.mjs can prove the template reproduces it before we
      // trust it to produce the corrected card.
      const VARIANTS = {
        v2: {
          subtitle: 'Lead Test Automation Engineer',
          // Tile 2 was "200+ / tests migrated" — that count belongs to the
          // Garantme JS->TS migration, not the Cypress -> Playwright one (124
          // test cases). See Practitioner_Context.md "Resolutions". The exact
          // 124 figure now lives in the About copy, where the outage narrative
          // gives it context; this slot carries a stronger outcome instead.
          stats: [
            ['95%+', 'suite stability'],
            ['60%+', 'less manual test design'],
            ['$100K+', 'Upwork · Top Rated Plus'],
            ['7+ yrs', 'test automation'],
          ],
        },
        reference: {
          subtitle: 'Test Automation Architect',
          stats: [
            ['95%+', 'suite stability'],
            ['200+', 'tests migrated'],
            ['$100K+', 'Upwork · Top Rated Plus'],
            ['7+ yrs', 'test automation'],
          ],
        },
      }

      const params = new URLSearchParams(location.search)
      const variant = VARIANTS[params.get('variant')] ?? VARIANTS.v2

      document.getElementById('subtitle').textContent = variant.subtitle

      const CONTENT_X = 88
      const COL_W = 256
      const stats = document.getElementById('stats')
      variant.stats.forEach(([value, caption], i) => {
        const x = CONTENT_X + i * COL_W

        const v = document.createElement('div')
        v.className = 'value'
        v.style.left = `${x}px`
        v.textContent = value
        stats.appendChild(v)

        const c = document.createElement('div')
        c.className = 'caption'
        c.style.left = `${x}px`
        c.textContent = caption
        stats.appendChild(c)
      })

      // generate.mjs waits on body.ready rather than a timeout, so the capture
      // can never race webfont loading and silently fall back to Helvetica.
      // font-display:block keeps the text invisible until then, so a failure
      // here yields an obviously empty card rather than a subtly wrong one.
      document.fonts.ready.then(() => {
        const missing = [
          ['700 76px "Space Grotesk"', 'Yaroslav Krivushenko'],
          ['500 40px "Space Grotesk"', 'Lead Test Automation Engineer'],
          ['500 20px "IBM Plex Mono"', 'AGENTIC SDLC'],
          ['400 15px "IBM Plex Mono"', 'suite stability'],
        ].filter(([font, text]) => !document.fonts.check(font, text))

        if (missing.length) {
          document.title = `FONT-ERROR: ${missing.map(([f]) => f).join(', ')}`
          return
        }
        document.body.classList.add('ready')
      })
    </script>
  </body>
</html>
